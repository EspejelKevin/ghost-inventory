services:
  postgres_db:
    image: postgres:15-alpine
    container_name: ghost_inventory_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ghost_inventory_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis_cache:
    image: redis:7-alpine
    container_name: ghost_inventory_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
